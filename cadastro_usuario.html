<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>

     <script src="script.js"></script>
</head>
<body>
 <div id="side-menu" class="side-nav">

    <a href="home.html">Home</a>
    <a href="compra.html" class="logado-only">Comprar</a>
    <a href="cliente.html" class="cliente-only">Meus Tickets</a>
    <a href="pesquisa.html" class="admin-only">Pesquisa de Usuário</a>
    <a href="cadastro_usuario.html" class="admin-only">Cadastrar Usuário</a>
    <a href="admin.html" class="admin-only">ADM</a>
    <a href="cadastro_cardapio.html" class="admin-only">Cadastrar Cardápio</a>
    <hr style="border: 0.5px solid rgba(255,255,255,0.2); margin: 10px 0;">
        <a href="contato.html">Fale Conosco</a>
    <a href="login.html">Sair</a> 
</div>

<div id="menu-overlay" class="overlay" onclick="toggleMenu()"></div>
   <header class="header-centered">
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div class="logo-container" onclick="location.href='home.html'">
        <img src="imagens/LOGO.png" class="logo-img">
    </div>
    </header>

    <div class="breadcrumbs">Home ➔ Pesquisa de usuario ➔ Cadastro de usuario</div>

    <div class="main-container">
        <h2>Cadastro de usuario</h2>
        <div class="grid-form">
            <div class="input-group"><label>Nome</label><input type="text" placeholder="Nome Completo"></div>
            <div class="input-group"><label>CPF</label><input type="text" placeholder="CPF"></div>
            <div class="input-group"><label>Função</label><select><option>Cliente</option><option>Funcionário</option></select></div>
            <div class="input-group"><label>Email</label><input type="email" placeholder="email@exemplo.com"></div>
            <div class="input-group"><label>Telefone</label><input type="text" placeholder="(00) 00000-0000"></div>
            <div class="input-group"><label>Data de nascimento</label><input type="date"></div>
            <div class="input-group">
    <label>Senha</label>
    <div style="position: relative;">
        <input type="password" id="senha" placeholder="Senha" style="width: 100%;-webkit-text-security: asterisk;">
        <span onclick="togglePassword('senha')" style="position: absolute; right: 10px; top: 12px; cursor: pointer; font-size: 14px;">👁️</span>
    </div>
</div>

<div class="input-group">
    <label>Confirmar senha</label>
    <div style="position: relative;">
        <input type="password" id="confirmar_senha" placeholder="Repita a senha" style="width: 100%;-webkit-text-security: asterisk;">
        <span onclick="togglePassword('confirmar_senha')" style="position: absolute; right: 10px; top: 12px; cursor: pointer; font-size: 14px;">👁️</span>
    </div>
</div>

            <div class="input-group" style="flex-direction: row; align-items: center; gap: 10px; padding-top: 30px;">
                <input type="checkbox" id="alterar" style="width: 20px; height: 20px;">
                <label for="alterar" style="margin: 0;">Alterar senha no próximo acesso</label>
            </div>
             <div class="input-group"><label>ID</label><input type="text" value="AUTOGERADO" disabled style="background: #eee;"></div>
        </div>

        <div class="actions-row">
            <button class="btn btn-gray" onclick="location.href='pesquisa.html'">Cancelar</button>
            <button class="btn btn-blue" onclick="confirmarCadastro()">Confirmar</button>
        </div>
    </div>
          <script>
         // Bloqueio de segurança: se não for funcionário, expulsa da página
if (localStorage.getItem('perfilUsuario') !== 'funcionario') {
    alert("Acesso negado! Área restrita a funcionários.");
    location.href = 'home.html';
}
// Função para confirmar, alertar e limpar campos
function confirmarCadastro() {
    // Aqui você pode adicionar validações se desejar
    alert('Cadastrado com sucesso!');

    // Seleciona todos os inputs e selects dentro da grid-form
    const inputs = document.querySelectorAll('.grid-form input:not([disabled])');
    const selects = document.querySelectorAll('.grid-form select');

    // Limpa os campos de texto, email, date e password
    inputs.forEach(input => {
        if (input.type === 'checkbox') {
            input.checked = false;
        } else {
            input.value = '';
        }
    });

    // Reseta os selects para a primeira opção
    selects.forEach(select => {
        select.selectedIndex = 0;
    });
}

</script>
</body>
</html>
